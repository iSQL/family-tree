  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 = {\n  1:[430,20], 2:[650,20],\n  3:[150,182], 5:[370,182], 4:[760,182], 6:[980,182],\n  7:[50,344], 11:[270,344], 8:[490,344], 9:[720,344], 10:[940,344],\n  12:[160,506],\n};\n\nconst FAMILIES = [\n  { repId:1, coId:2, name:'Petrović', founders:'Milan & Zorka', designated:true, size:12 },\n  { repId:6, coId:4, name:'Ilić', founders:'Goran & Snežana', designated:false, size:4 },\n  { repId:7, coId:11, name:'Petrović', founders:'Nikola & Milica', designated:false, size:3 },\n];\n\nconst DEG_WORD = ['nulto','prvo','drugo','treće','četvrto','peto','šesto','sedmo','osmo'];\n\nclass Component extends DCLogic {\n  state = { theme:'light', viewport:'desktop', route:'chooser', focusId:1, selectedId:null, kinship:false, kinSel:[], calcA:7, calcB:9 };\n\n  P(id){ return PERSONS.find(p => p.id === id) || null; }\n\n  parse(s){\n    if(!s) return null;\n    const p = s.split('.').filter(x => x !== '').map(Number);\n    if(p.length === 3) return { d:p[0], m:p[1], y:p[2] };\n    if(p.length === 2) return { d:null, m:p[0], y:p[1] };\n    if(p.length === 1) return { d:null, m:null, y:p[0] };\n    return null;\n  }\n  pad(n){ return n < 10 ? '0'+n : ''+n; }\n  fmtDate(s){\n    const p = this.parse(s); if(!p) return '';\n    if(p.d) return `${this.pad(p.d)}.${this.pad(p.m)}.${p.y}.`;\n    if(p.m) return `${this.pad(p.m)}.${p.y}.`;\n    return `${p.y}.`;\n  }\n  yearOf(s){ const p = this.parse(s); return p ? p.y : null; }\n  lifespan(b,d){\n    const by = this.yearOf(b), dy = this.yearOf(d);\n    if(by && dy) return `${by}–${dy}`;\n    if(by) return `${by}.`;\n    if(dy) return `†${dy}`;\n    return '';\n  }\n  ini(p){ return ((p.first[0]||'') + (p.last[0]||'')).toUpperCase(); }\n  full(p){ return `${p.first} ${p.last}`; }\n\n  genColor(g){\n    const dark = this.state.theme === 'dark';\n    if(g === 'M') return dark ? '#5f83ad' : '#294d75';\n    if(g === 'F') return dark ? '#d0aa5b' : '#b0862f';\n    return dark ? '#93a2b7' : '#8a7c6a';\n  }\n\n  cp(id){\n    const p = this.P(id); if(!p) return null;\n    return { id, name:this.full(p), ini:this.ini(p), bg:this.genColor(p.gender), onClick:() => this.openPerson(id) };\n  }\n\n  // -------- actions --------\n  setTheme(t){ this.setState({ theme:t }); }\n  setViewport(v){ this.setState({ viewport:v }); }\n  go(route){ this.setState({ route, selectedId:null, kinship:false, kinSel:[] }); }\n  openFamily(repId){ this.setState({ focusId:repId, route:'tree', selectedId:null }); }\n  openPerson(id){ if(this.state.kinship){ this.toggleKin(id); return; } this.setState({ selectedId:id }); }\n  closePerson(){ this.setState({ selectedId:null }); }\n  toggleKinship(){\n    this.setState(s => s.kinship ? { kinship:false, kinSel:[] } : { kinship:true, selectedId:null });\n  }\n  toggleKin(id){\n    this.setState(s => {\n      const sel = s.kinSel;\n      if(sel.includes(id)) return { kinSel: sel.filter(x => x !== id) };\n      if(sel.length < 2) return { kinSel:[...sel, id] };\n      return { kinSel:[sel[1], id] };\n    });\n  }\n\n  // -------- tree layout --------\n  treeData(){\n    const nodes = PERSONS.filter(p => POS[p.id]).map(p => {\n      const [x,y] = POS[p.id];\n      const accent = this.genColor(p.gender);\n      const isMain = p.id === this.state.focusId;\n      const isSel = this.state.kinSel.includes(p.id);\n      let card = `display:flex;align-items:center;gap:10px;height:60px;padding:8px 12px 8px 10px;border-radius:10px;border-left:5px solid ${accent};background:var(--cardbg);box-shadow:0 2px 6px rgba(20,30,50,.14);color:var(--ink);cursor:pointer;overflow:hidden;transition:box-shadow .15s,transform .1s`;\n      if(isMain) card += ';outline:3px solid var(--gold);outline-offset:2px';\n      if(isSel) card += ';outline:3px solid var(--navy-line);outline-offset:2px;box-shadow:0 0 0 5px var(--sel-ring)';\n      return {\n        id:p.id, name:this.full(p), years:this.lifespan(p.birth, p.death), ini:this.ini(p), bg:accent,\n        nodeStyle:`position:absolute;left:${x}px;top:${y}px;width:196px`,\n        cardStyle:card, onClick:() => this.openPerson(p.id),\n      };\n    });\n    // links\n    let d = '';\n    const cx = id => POS[id][0] + 98, cyTop = id => POS[id][1], cyBot = id => POS[id][1] + 60, cyMid = id => POS[id][1] + 30;\n    for(const u of UNIONS){\n      if(!POS[u.p1] || !POS[u.p2]) continue;\n      const a = POS[u.p1][0] < POS[u.p2][0] ? u.p1 : u.p2;\n      const b = a === u.p1 ? u.p2 : u.p1;\n      d += ` M ${POS[a][0]+196} ${cyMid(a)} H ${POS[b][0]}`;\n    }\n    for(const u of UNIONS){\n      const kids = PERSONS.filter(p => (p.fatherId === u.p1 && p.motherId === u.p2) || (p.fatherId === u.p2 && p.motherId === u.p1)).filter(k => POS[k.id]);\n      if(kids.length === 0) continue;\n      const midX = (cx(u.p1) + cx(u.p2)) / 2;\n      const pBot = cyBot(u.p1);\n      const childTop = cyTop(kids[0].id);\n      const busY = pBot + (childTop - pBot) / 2;\n      d += ` M ${midX} ${pBot} V ${busY}`;\n      const xs = kids.map(k => cx(k.id));\n      d += ` M ${Math.min(...xs)} ${busY} H ${Math.max(...xs)}`;\n      for(const k of kids) d += ` M ${cx(k.id)} ${busY} V ${cyTop(k.id)}`;\n    }\n    return { nodes, path:d.trim(), w:1180, h:600 };\n  }\n\n  // -------- person detail --------\n  detail(){\n    const id = this.state.selectedId; if(id == null) return null;\n    const p = this.P(id); if(!p) return null;\n    const parents = [];\n    if(p.fatherId) parents.push(this.cp(p.fatherId));\n    if(p.motherId) parents.push(this.cp(p.motherId));\n    const siblings = PERSONS.filter(o => o.id !== id && ((p.fatherId && o.fatherId === p.fatherId) || (p.motherId && o.motherId === p.motherId))).map(o => {\n      const shareF = p.fatherId && o.fatherId === p.fatherId;\n      const shareM = p.motherId && o.motherId === p.motherId;\n      let badge; if(shareF && !shareM) badge = 'po ocu'; else if(shareM && !shareF) badge = 'po majci';\n      const c = this.cp(o.id); c.badge = badge; return c;\n    });\n    const unions = UNIONS.filter(u => u.p1 === id || u.p2 === id).map(u => {\n      const partnerId = u.p1 === id ? u.p2 : u.p1;\n      const parts = [u.type === 'marriage' ? 'Brak' : 'Partnerstvo'];\n      if(u.start) parts.push(this.fmtDate(u.start));\n      if(u.end) parts.push('do ' + this.fmtDate(u.end));\n      return { partner:this.cp(partnerId), summary:parts.join(' · ') };\n    });\n    const children = PERSONS.filter(o => o.fatherId === id || o.motherId === id).map(o => this.cp(o.id));\n    return {\n      id, name:this.full(p), title:p.title || '', maiden:p.maiden ? 'rođ. ' + p.maiden : '',\n      years:this.lifespan(p.birth, p.death), place:p.place || '', notes:p.notes || '',\n      bg:this.genColor(p.gender), ini:this.ini(p), isHead:!!p.isHead,\n      parents, siblings, unions, children,\n      hasParents:parents.length > 0, hasSiblings:siblings.length > 0, hasUnions:unions.length > 0,\n      hasChildren:children.length > 0, hasNotes:!!p.notes,\n    };\n  }\n\n  // -------- families (chooser) --------\n  families(){\n    return FAMILIES.map(f => {\n      const rep = this.P(f.repId);\n      return { repId:f.repId, name:f.name, founders:f.founders, designated:f.designated,\n        size:f.size, ini:this.ini(rep), bg:this.genColor(rep.gender),\n        years:this.lifespan(rep.birth, rep.death), onClick:() => this.openFamily(f.repId) };\n    });\n  }\n\n  // -------- birthdays --------\n  nextBday(s){\n    const p = this.parse(s); if(!p || !p.d || !p.m) return null;\n    let n = new Date(TODAY.getFullYear(), p.m - 1, p.d);\n    if(n < new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate())) n = new Date(TODAY.getFullYear() + 1, p.m - 1, p.d);\n    return n;\n  }\n  daysTo(n){ return Math.round((n - new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate())) / 86400000); }\n  daysLabel(n){ return `za ${n} ${n % 10 === 1 && n % 100 !== 11 ? 'dan' : 'dana'}`; }\n  turnsLabel(n){\n    const a = n % 10, b = n % 100;\n    const w = a === 1 && b !== 11 ? 'godinu' : a >= 2 && a <= 4 && (b < 12 || b > 14) ? 'godine' : 'godina';\n    return `puni ${n} ${w}`;\n  }\n  yearsLabel(n){\n    const a = n % 10, b = n % 100;\n    const w = a === 1 && b !== 11 ? 'godina' : a >= 2 && a <= 4 && (b < 12 || b > 14) ? 'godine' : 'godina';\n    return `${n} ${w} braka`;\n  }\n  badge(days){\n    if(days === 0) return { kind:'today', text:'Danas! 🎂' };\n    if(days === 1) return { kind:'soon', text:'Sutra' };\n    return { kind:'far', text:this.daysLabel(days) };\n  }\n  birthdays(){\n    const out = [];\n    for(const p of PERSONS){\n      if(p.death) continue;\n      const n = this.nextBday(p.birth); if(!n) continue;\n      const days = this.daysTo(n);\n      const turns = n.getFullYear() - this.yearOf(p.birth);\n      out.push({ id:p.id, name:this.full(p), ini:this.ini(p), bg:this.genColor(p.gender),\n        dateStr:this.fmtDate(p.birth), turns:this.turnsLabel(turns), days, badge:this.badge(days) });\n    }\n    out.sort((a,b) => a.days - b.days || a.name.localeCompare(b.name, 'sr'));\n    return out;\n  }\n  anniversaries(){\n    const out = [];\n    for(const u of UNIONS){\n      if(u.type !== 'marriage' || u.end) continue;\n      const a = this.P(u.p1), b = this.P(u.p2);\n      if(!a || !b || a.death || b.death) continue;\n      const n = this.nextBday(u.start); if(!n) continue;\n      const days = this.daysTo(n);\n      const yrs = n.getFullYear() - this.yearOf(u.start);\n      out.push({ id:u.id, a:this.cp(u.p1), b:this.cp(u.p2), dateStr:this.fmtDate(u.start),\n        years:this.yearsLabel(yrs), days, badge:this.badge(days) });\n    }\n    out.sort((a,b) => a.days - b.days);\n    return out;\n  }\n\n  // -------- timeline --------\n  tlTint(type){\n    const dark = this.state.theme === 'dark';\n    if(type === 'birth') return dark ? 'background:#28466b;color:#cfe0f2' : 'background:#e3ecf5;color:#294d75';\n    if(type === 'marriage' || type === 'partnership') return dark ? 'background:#4c411f;color:#e7cd85' : 'background:#f2e7cd;color:#8f6c24';\n    return dark ? 'background:#2b4368;color:#c3cddd' : 'background:#e8dfd0;color:#6e6558';\n  }\n  timeline(){\n    const evs = [];\n    for(const p of PERSONS){\n      const b = this.parse(p.birth);\n      if(b) evs.push({ key:'b'+p.id, type:'birth', label:'Rođenje', ic:'baby', date:p.birth, y:b.y, persons:[this.cp(p.id)] });\n      const d = this.parse(p.death);\n      if(d) evs.push({ key:'d'+p.id, type:'death', label:'Smrt', ic:'cross', date:p.death, y:d.y, persons:[this.cp(p.id)] });\n    }\n    for(const u of UNIONS){\n      const s = this.parse(u.start);\n      const pp = [this.cp(u.p1), this.cp(u.p2)].filter(Boolean);\n      if(s) evs.push({ key:'u'+u.id, type:u.type === 'marriage' ? 'marriage' : 'partnership', label:u.type === 'marriage' ? 'Venčanje' : 'Partnerstvo', ic:'heart', date:u.start, y:s.y, persons:pp });\n    }\n    evs.sort((a,b) => a.y - b.y || (this.parse(a.date).m||0) - (this.parse(b.date).m||0));\n    const groups = [];\n    for(const e of evs){\n      const dec = Math.floor(e.y / 10) * 10;\n      let g = groups[groups.length - 1];\n      if(!g || g.decade !== dec){ g = { decade:dec, label:dec + '-e', events:[] }; groups.push(g); }\n      g.events.push({ ...e, dateStr:this.fmtDate(e.date), icon:icon(e.ic, 14), iconStyle:this.tlTint(e.type) });\n    }\n    return groups;\n  }\n\n  // -------- kinship --------\n  ancestors(id){\n    const map = new Map(); const q = [[id,0,null]];\n    while(q.length){\n      const [cur,depth,prev] = q.shift();\n      if(map.has(cur)) continue;\n      map.set(cur, { depth, prev });\n      const p = this.P(cur); if(!p) continue;\n      if(p.fatherId) q.push([p.fatherId, depth+1, cur]);\n      if(p.motherId) q.push([p.motherId, depth+1, cur]);\n    }\n    return map;\n  }\n  kinResult(){\n    const a = this.state.calcA, b = this.state.calcB;\n    if(a == null || b == null || a === b) return null;\n    const union = UNIONS.find(u => (u.p1 === a && u.p2 === b) || (u.p1 === b && u.p2 === a));\n    const pa = this.P(a), pb = this.P(b);\n    const chainUp = (map, from, lca) => { const arr = []; let c = from; while(c != null){ arr.push(this.cp(c)); if(c === lca) break; c = map.get(c).prev; } return arr; };\n    if(union){\n      return { title:'Supružnici', degree:null, ancestor:null, path:[this.cp(a), this.cp(b)],\n        sub:`${this.full(pa)} i ${this.full(pb)} su u braku.` };\n    }\n    const am = this.ancestors(a), bm = this.ancestors(b);\n    let best = null;\n    for(const [id, info] of am){ if(bm.has(id)){ const sum = info.depth + bm.get(id).depth; if(!best || sum < best.sum) best = { id, la:info.depth, lb:bm.get(id).depth, sum }; } }\n    if(!best) return { title:'Bez srodstva', degree:null, ancestor:null, path:[], sub:'Nema zajedničkog pretka u stablu.' };\n    const { la, lb } = best;\n    const gB = pb.gender;\n    const key = la + '-' + lb;\n    const terms = {\n      '1-0': gB === 'M' ? 'Otac' : gB === 'F' ? 'Majka' : 'Roditelj',\n      '0-1': gB === 'M' ? 'Sin' : gB === 'F' ? 'Ćerka' : 'Dete',\n      '1-1': gB === 'M' ? 'Brat' : gB === 'F' ? 'Sestra' : 'Brat / sestra',\n      '2-0': gB === 'M' ? 'Deda' : gB === 'F' ? 'Baba' : 'Deda / baba',\n      '0-2': gB === 'M' ? 'Unuk' : gB === 'F' ? 'Unuka' : 'Unuče',\n      '2-1': gB === 'M' ? 'Stric / ujak' : gB === 'F' ? 'Tetka / strina' : 'Stric / tetka',\n      '1-2': gB === 'M' ? 'Bratanac / sestrić' : gB === 'F' ? 'Bratanica / sestričina' : 'Nećak / nećaka',\n      '2-2': 'Prvi rođaci',\n    };\n    const title = terms[key] || 'Dalji rođaci';\n    const degree = la + lb;\n    const anc = this.P(best.id);\n    const up = chainUp(am, a, best.id);\n    const down = chainUp(bm, b, best.id).reverse();\n    const path = [...up, ...down.slice(1)];\n    return { title, degree, degreeWord:(DEG_WORD[degree]||degree) + ' koleno', ancestor:this.full(anc), path,\n      sub:key === '2-2' ? `${pa.first} i ${pb.first} su deca braće i sestara.` : `Preko zajedničkog pretka.` };\n  }\n\n  navList(){\n    const r = this.state.route;\n    const treeR = r === 'tree' || r === 'chooser';\n    const items = [\n      { route:'chooser', label:'Porodice', ic:'users', active:treeR },\n      { route:'birthdays', label:'Rođendani', ic:'cake', active:r === 'birthdays' },\n      { route:'timeline', label:'Vremenska', ic:'history', active:r === 'timeline' },\n      { route:'kinship', label:'Srodstvo', ic:'handshake', active:r === 'kinship' },\n      { route:'gedcom', label:'GEDCOM', ic:'fileText', active:r === 'gedcom' },\n      { route:'settings', label:'Podešavanja', ic:'settings', active:r === 'settings' },\n    ];\n    const dBase = 'display:inline-flex;align-items:center;gap:6px;border-radius:9px;padding:7px 11px;font-family:var(--f-label);font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;';\n    const mBase = 'flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px 4px;cursor:pointer;text-align:center;';\n    return items.map(it => ({ ...it, icon:icon(it.ic, 17), iconM:icon(it.ic, 20), onClick:() => this.go(it.route),\n      deskStyle:dBase + (it.active ? 'background:var(--activebg);color:var(--activefg)' : 'color:var(--muted)'),\n      mobStyle:mBase + (it.active ? 'color:var(--activefg)' : 'color:var(--faint)') }));\n  }\n\n  rootStyle(){\n    const dark = this.state.theme === 'dark';\n    const mob = this.state.viewport === 'mobile';\n    const pal = dark\n      ? '--bg:#14294a;--surface:#1d3557;--surface2:#24406b;--cardbg:#213b60;--ink:#f1e9de;--muted:#b7c1d2;--faint:#8595ad;--border:#2e4c74;--heading:#f5ebe0;--activebg:#33507a;--activefg:#e4c378;--desk:#0d1c36;--navy-line:#7d9bc0;--sel-ring:rgba(125,155,192,.28);--treeline:#39567f'\n      : '--bg:#f5ebe0;--surface:#faf6f0;--surface2:#efe6da;--cardbg:#ffffff;--ink:#2b2b2b;--muted:#6e6558;--faint:#9a8e7e;--border:#e2d7c7;--heading:#1d3557;--activebg:#f2e6ce;--activefg:#8a6d1f;--desk:#e7dccd;--navy-line:#1d3557;--sel-ring:rgba(29,53,87,.16);--treeline:#dac9b2';\n    const common = '--navy:#1d3557;--navy2:#162e4e;--gold:#c29b47;--goldd:#b89040;--cream:#f5ebe0;--onnav:#f5ebe0;--f-display:\\'Marcellus\\',Georgia,serif;--f-label:\\'Marcellus SC\\',Georgia,serif;--f-body:\\'Cormorant Garamond\\',Georgia,serif';\n    const frame = mob\n      ? '--frame-w:392px;--frame-pad:11px;--frame-radius:54px;--outerbg:#0e1a30;--frame-shadow:0 40px 80px -30px rgba(10,20,40,.65);--screen-h:790px;--screen-radius:43px'\n      : '--frame-w:1060px;--frame-pad:0px;--frame-radius:13px;--outerbg:var(--surface);--frame-shadow:0 36px 90px -35px rgba(15,25,45,.5);--screen-h:722px;--screen-radius:13px';\n    return `${pal};${common};${frame};min-height:100vh;padding:30px 24px 56px;background:var(--desk);display:flex;flex-direction:column;align-items:center;gap:22px;font-family:var(--f-body);color:var(--ink);font-size:16px`;\n  }\n\n  seg(active){\n    const base = 'display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-family:var(--f-label);font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;transition:all .15s;';\n    return base + (active ? 'background:var(--navy);color:var(--onnav)' : 'color:var(--muted)');\n  }\n\n  renderVals(){\n    const s = this.state;\n    const tree = this.treeData();\n    const nav = this.navList();\n    const kinSelChips = s.kinSel.map(id => this.cp(id));\n    return {\n      rootStyle:this.rootStyle(),\n      isDesktop:s.viewport === 'desktop', isMobile:s.viewport === 'mobile',\n      route:s.route, isLogin:s.route === 'login', showChrome:s.route !== 'login',\n      showChromeDesktop:s.route !== 'login' && s.viewport === 'desktop',\n      showChromeMobile:s.route !== 'login' && s.viewport === 'mobile',\n      navHome:() => this.go('chooser'),\n      notKinship:!s.kinship,\n      drawerDesktop:s.viewport === 'desktop' && s.selectedId != null && s.route !== 'login',\n      sheetMobile:s.viewport === 'mobile' && s.selectedId != null && s.route !== 'login',\n      setThemeLightBtn:'display:inline-flex;align-items:center;gap:7px;border-radius:9px;padding:9px 15px;font-family:var(--f-label);font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);' + (s.theme === 'light' ? 'background:var(--navy);color:var(--onnav);border-color:var(--navy)' : 'background:var(--bg);color:var(--ink)'),\n      setThemeDarkBtn:'display:inline-flex;align-items:center;gap:7px;border-radius:9px;padding:9px 15px;font-family:var(--f-label);font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);' + (s.theme === 'dark' ? 'background:var(--navy);color:var(--onnav);border-color:var(--navy)' : 'background:var(--bg);color:var(--ink)'),\n      isChooser:s.route === 'chooser', isTree:s.route === 'tree', isBirthdays:s.route === 'birthdays',\n      isTimeline:s.route === 'timeline', isKinship:s.route === 'kinship', isGedcom:s.route === 'gedcom', isSettings:s.route === 'settings',\n      segVpD:this.seg(s.viewport === 'desktop'), segVpM:this.seg(s.viewport === 'mobile'),\n      segThL:this.seg(s.theme === 'light'), segThD:this.seg(s.theme === 'dark'),\n      segScL:this.seg(s.route === 'login'), segScA:this.seg(s.route !== 'login'),\n      onVpD:() => this.setViewport('desktop'), onVpM:() => this.setViewport('mobile'),\n      onThL:() => this.setTheme('light'), onThD:() => this.setTheme('dark'),\n      onScLogin:() => this.setState({ route:'login' }), onScApp:() => this.setState({ route:s.route === 'login' ? 'chooser' : s.route }),\n      onLogin:() => this.go('chooser'),\n      nav,\n      iconSearch:icon('search', 17), iconSearchM:icon('search', 18), iconPlus:icon('plus', 16),\n      iconClose:icon('x', 18), iconCrownS:icon('crown', 11), iconHeart:icon('handshake', 16),\n      iconArrowLeft:icon('arrowLeft', 15), iconUsersC:icon('users', 20),\n      iconInfo:icon('info', 14), iconSwap:icon('arrowLR', 16), iconWaypoints:icon('waypoints', 14),\n      iconDownload:icon('download', 16), iconLogout:icon('logout', 16), iconFile:icon('fileText', 14),\n      iconChev:icon('chevronRight', 14), iconSun:icon('sun', 14), iconMoon:icon('moon', 14), iconMonitor:icon('monitor', 14),\n      // tree\n      treeNodes:tree.nodes, treePath:tree.path, treeW:tree.w + 'px', treeH:tree.h + 'px',\n      kinship:s.kinship, toggleKinship:() => this.toggleKinship(),\n      kinBtnStyle:'position:absolute;top:14px;right:14px;z-index:20;display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;font-family:var(--f-label);font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);box-shadow:0 6px 18px -6px rgba(20,30,50,.4);' + (s.kinship ? 'background:var(--navy);color:var(--onnav);border-color:var(--navy)' : 'background:var(--surface);color:var(--ink)'),\n      kinSelChips, kinPanelResult:s.kinSel.length === 2 ? this.kinResultFor(s.kinSel[0], s.kinSel[1]) : null,\n      onKinClear:() => this.setState({ kinSel:[] }),\n      // detail\n      detail:this.detail(), closePerson:() => this.closePerson(),\n      // chooser\n      families:this.families(),\n      // birthdays\n      birthdays:this.birthdays(), anniversaries:this.anniversaries(),\n      hasBirthdays:this.birthdays().length > 0, hasAnniv:this.anniversaries().length > 0,\n      // timeline\n      timeline:this.timeline(),\n      // kinship calc\n      calcA:String(s.calcA), calcB:String(s.calcB), kinResult:this.kinResult(),\n      personOptions:PERSONS.map(p => ({ id:String(p.id), label:`${this.full(p)}${this.lifespan(p.birth, p.death) ? ' (' + this.lifespan(p.birth, p.death) + ')' : ''}` })),\n      onCalcA:(e) => this.setState({ calcA:Number(e.target.value) }),\n      onCalcB:(e) => this.setState({ calcB:Number(e.target.value) }),\n      swapCalc:() => this.setState({ calcA:s.calcB, calcB:s.calcA }),\n      // settings\n      personsCount:PERSONS.length, unionsCount:UNIONS.length,\n    };\n  }\n\n  kinResultFor(a, b){ const sa = this.state.calcA, sb = this.state.calcB; this.state.calcA = a; this.state.calcB = b; const r = this.kinResult(); this.state.calcA = sa; this.state.calcB = sb; return r; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
